<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cruise Line Login</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;

        /* BACKGROUND IMAGE MOVED HERE */
        background-image: url("./pexels-asadphoto-1456291.jpg"); /* replace with your local image */
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
    }

    .container {
        text-align: center;
        color: white;
    }

    .title {
        margin-bottom: 15px;
        letter-spacing: 2px;
    }

    .login-box {
        background: #f5f5f5;
        padding: 30px;
        border-radius: 15px;
        width: 350px;
        color: #333;
        box-shadow: 0 5px 20px rgba(0,0,0,0.2);
    }

    .login-box h2 {
        margin-bottom: 5px;
    }

    .login-box p {
        margin-bottom: 20px;
        font-size: 14px;
    }

    .input-box {
        width: 100%;
        margin-bottom: 15px;
    }

    .input-box input {
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #ccc;
        outline: none;
    }

    .options {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 12px;
        margin-bottom: 15px;
    }

    .options a {
        color: blue;
        text-decoration: none;
    }

    .btn {
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 20px;
        background: #4da6ff;
        color: white;
        cursor: pointer;
        margin-bottom: 15px;
    }

    .social {
        margin: 10px 0;
    }

    .social img {
        width: 30px;
        margin: 0 10px;
        cursor: pointer;
    }

    .signup {
        font-size: 12px;
    }

    .signup a {
        color: blue;
        text-decoration: none;
    }
    .title{
        color: rgb(4, 4, 94);
        font-size: 50px;
    }

</style>
</head>

<body>

<div class="container">
    <h2 class="title">CRUISE LINE</h2>

    <div class="login-box">
        <h2>Please enter your Details</h2>
        <p>Welcome Back!</p>

        <div class="input-box">
            <input type="email" placeholder="Email address">
        </div>

        <div class="input-box">
            <input type="password" placeholder="Password">
        </div>

        <div class="options">
            <label><input type="checkbox"> Remember for 30 days</label>
            <a href="#">Forgot Password</a>
        </div>
        
        <button class="btn"><a href="./index.html">Sign in</a></button>

        <p>You can Connect with</p>

        <div class="social">
            <img src="./facebook.png">
            <img src="./google.png">
            <img src="./apple-logo.png">
        </div>
        <section class="login-section">
        <div class="signup">
            Don't have an account? <a href="#">Sign up</a>
        </div>
    </div>
</div>

</body>
</html>
